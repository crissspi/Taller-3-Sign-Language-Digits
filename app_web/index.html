<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador de Lenguaje de Señas (Dígitos)</title>
    <!-- Importamos TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <!-- Importamos OpenCV.js (opcional, útil si necesitan preprocesar la imagen como en Python) -->
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Sign Language Digits</h1>
    <p class="subtitle">Clasificador usando Redes Neuronales Convolucionales (CNN)</p>

    <div class="container">
        <div id="status">Esperando cargar modelo...</div>
        
        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
        </div>

        <div class="controls">
            <button id="start-btn" disabled>Iniciar Cámara</button>
            <button id="predict-btn" disabled>Predecir</button>
        </div>

        <div id="prediction-box">
            Predicción: --
        </div>
    </div>

    <!-- Archivo principal de lógica JS -->
    <script src="app.js"></script>
</body>
</html>
